<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>BraidsByNauja™ | Photo Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --black: #0b0b0b;
    --gold: #d6b37b;
    --white: #fffdfb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
}
.container {
    width: min(900px, 92%);
    margin: auto;
    padding: 60px 0;
}
h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    margin-bottom: 8px;
}
.subtitle {
    color: #c9b9ac;
    margin-bottom: 40px;
}
/* ---------- Login ---------- */
#login-panel {
    max-width: 400px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 24px;
    padding: 32px;
}
#login-panel input {
    width: 100%;
    padding: 14px;
    margin-bottom: 14px;
    border-radius: 14px;
    border: none;
    background: var(--white);
    color: #111;
    font-family: inherit;
    font-size: 1rem;
}
.btn {
    padding: 14px 22px;
    border-radius: 999px;
    border: none;
    font-weight: 600;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    background: linear-gradient(135deg, var(--gold), #f5dfb2);
    color: #111;
}
.btn.small {
    padding: 8px 16px;
    font-size: .85rem;
}
#login-error {
    color: #e58a8a;
    margin-top: 10px;
    font-size: .9rem;
    min-height: 1.2em;
}
/* ---------- Upload panel ---------- */
#upload-panel { display: none; }
.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}
.slots {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 22px;
}
.slot {
    background: #151515;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.1);
}
.slot img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #1c1c1c;
    display: block;
}
.slot-body {
    padding: 16px;
}
.slot-body h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 10px;
}
.slot-body input[type="file"] {
    width: 100%;
    font-size: .8rem;
    color: #c9b9ac;
    margin-bottom: 10px;
}
.slot-status {
    font-size: .8rem;
    margin-top: 8px;
    min-height: 1.2em;
    color: #9fe0b0;
}
.slot-status.error { color: #e58a8a; }

/* ---------- Site text editor ---------- */
.section-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    margin: 50px 0 20px;
}
.text-fields {
    display: flex;
    flex-direction: column;
    gap: 18px;
}
.text-field {
    background: #151515;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 16px;
    padding: 16px;
}
.text-field label {
    display: block;
    font-size: .8rem;
    color: #c9b9ac;
    margin-bottom: 8px;
}
.text-field input,
.text-field textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: var(--white);
    color: #111;
    font-family: inherit;
    font-size: .95rem;
    margin-bottom: 10px;
}
.text-field textarea {
    min-height: 70px;
    resize: vertical;
}
.item-actions {
    display: flex;
    align-items: center;
    gap: 10px;
}
.item-actions .btn.danger {
    background: transparent;
    border: 1px solid rgba(229,138,138,.5);
    color: #e58a8a;
}
.item-actions .btn.neutral {
    background: transparent;
    border: 1px solid rgba(255,255,255,.25);
    color: var(--white);
}
.item-title-display {
    font-size: 1.05rem;
    margin-bottom: 6px;
}
.item-body-display {
    color: #c9b9ac;
    font-size: .9rem;
    white-space: pre-line;
}

.item-details-display {
    color: #8f8f8f;
    font-size: .85rem;
    margin-top: 6px;
    white-space: pre-line;
}
.item-status {
    font-size: .8rem;
    color: #9fe0b0;
}
.item-status.error { color: #e58a8a; }
</style>
</head>
<body>

<div class="container">
    <h1>Site Manager</h1>
    <p class="subtitle">Log in, then update photos or site text. Changes go live within a minute.</p>

    <div id="login-panel">
        <form id="login-form">
            <input id="login-email" type="email" placeholder="Email" required>
            <input id="login-password" type="password" placeholder="Password" required>
            <button class="btn" type="submit" style="width:100%;">Log In</button>
        </form>
        <p id="login-error"></p>
    </div>

    <div id="upload-panel">
        <div class="top-row">
            <span id="whoami" class="subtitle" style="margin:0;"></span>
            <button id="logout-btn" class="btn small">Log Out</button>
        </div>
        <div class="slots" id="slots"></div>

        <h2 class="section-heading">Pricing</h2>
        <p class="subtitle" style="margin-bottom:20px;">Add, edit, or remove services and prices as needed.</p>
        <div class="text-fields" id="pricing-items"></div>
        <button id="add-pricing-btn" class="btn small" style="margin-top:16px;">+ Add New</button>

        <h2 class="section-heading">Hair Care &amp; Policies</h2>
        <p class="subtitle" style="margin-bottom:20px;">Add, edit, or remove as many of these as you like — the site shows however many exist.</p>
        <div class="text-fields" id="policy-items"></div>
        <button id="add-policy-btn" class="btn small" style="margin-top:16px;">+ Add New</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://cessfiegclsjwszmhmqv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_VxNojZOpgSe9R4Rv8nhgmQ_4N4WEPwi';
    const BUCKET = 'site-images';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const SLOTS = [
        { path: 'hero.jpg', label: 'Hero Background Photo' },
        { path: 'logo.png', label: 'Logo' },
        { path: 'before-1.jpg', label: 'Before / After — Photo 1' },
        { path: 'before-2.jpg', label: 'Before / After — Photo 2' },
        { path: 'gallery-boho.jpg', label: 'Gallery — Boho Knotless' },
        { path: 'gallery-fulani.jpg', label: 'Gallery — Luxury Fulani' },
        { path: 'gallery-silkpress.jpg', label: 'Gallery — Silk Press Braids' },
        { path: 'stylist.jpg', label: 'Stylist Portrait' },
        { path: 'ig-1.jpg', label: 'Instagram Photo 1' },
        { path: 'ig-2.jpg', label: 'Instagram Photo 2' },
        { path: 'ig-3.jpg', label: 'Instagram Photo 3' },
        { path: 'ig-4.jpg', label: 'Instagram Photo 4' }
    ];

    function publicUrl(path) {
        return supabaseClient.storage.from(BUCKET).getPublicUrl(path).data.publicUrl + '?t=' + Date.now();
    }

    function renderSlots() {
        const container = document.getElementById('slots');
        container.innerHTML = '';
        SLOTS.forEach(slot => {
            const card = document.createElement('div');
            card.className = 'slot';
            card.innerHTML = `
                <img src="${publicUrl(slot.path)}" alt="${slot.label}" onerror="this.style.opacity=0.25;">
                <div class="slot-body">
                    <h3>${slot.label}</h3>
                    <input type="file" accept="image/*" data-path="${slot.path}">
                    <button class="btn small" data-upload="${slot.path}">Upload New Photo</button>
                    <p class="slot-status"></p>
                </div>
            `;
            container.appendChild(card);
        });

        container.querySelectorAll('button[data-upload]').forEach(btn => {
            btn.addEventListener('click', async () => {
                const path = btn.dataset.upload;
                const card = btn.closest('.slot');
                const fileInput = card.querySelector('input[type="file"]');
                const status = card.querySelector('.slot-status');
                const file = fileInput.files[0];

                if (!file) {
                    status.textContent = 'Choose a photo first.';
                    status.classList.add('error');
                    return;
                }

                btn.disabled = true;
                status.classList.remove('error');
                status.textContent = 'Uploading...';

                const { error } = await supabaseClient.storage.from(BUCKET).upload(path, file, {
                    upsert: true,
                    contentType: file.type,
                    cacheControl: '60'
                });

                btn.disabled = false;

                if (error) {
                    status.textContent = 'Upload failed: ' + error.message;
                    status.classList.add('error');
                } else {
                    status.textContent = 'Saved! Live on the site within a minute.';
                    card.querySelector('img').src = publicUrl(path);
                    fileInput.value = '';
                }
            });
        });
    }

    async function renderPolicyItems() {
        const container = document.getElementById('policy-items');
        const { data, error } = await supabaseClient
            .from('policy_items')
            .select('id, title, body')
            .order('created_at', { ascending: true });

        container.innerHTML = '';
        if (error || !data) return;

        data.forEach(item => {
            const wrap = document.createElement('div');
            wrap.className = 'text-field';
            wrap.dataset.id = item.id;
            wrap.innerHTML = `
                <div class="item-view">
                    <h4 class="item-title-display"></h4>
                    <p class="item-body-display"></p>
                    <div class="item-actions" style="margin-top:10px;">
                        <button class="btn small item-edit">Edit</button>
                        <button class="btn small danger item-delete">Delete</button>
                        <span class="item-status"></span>
                    </div>
                </div>
                <div class="item-edit-form" style="display:none;">
                    <label>Heading</label>
                    <input type="text" class="item-title">
                    <label>Text</label>
                    <textarea class="item-body"></textarea>
                    <div class="item-actions">
                        <button class="btn small item-save">Save</button>
                        <button class="btn small neutral item-cancel">Cancel</button>
                        <span class="item-status"></span>
                    </div>
                </div>
            `;
            wrap.querySelector('.item-title-display').textContent = item.title;
            wrap.querySelector('.item-body-display').textContent = item.body;
            wrap.querySelector('.item-title').value = item.title;
            wrap.querySelector('.item-body').value = item.body;
            container.appendChild(wrap);
        });

        function setMode(wrap, mode) {
            wrap.querySelector('.item-view').style.display = mode === 'view' ? 'block' : 'none';
            wrap.querySelector('.item-edit-form').style.display = mode === 'edit' ? 'block' : 'none';
        }

        container.querySelectorAll('.item-edit').forEach(btn => {
            btn.addEventListener('click', () => {
                const wrap = btn.closest('.text-field');
                wrap.querySelector('.item-title').value = wrap.querySelector('.item-title-display').textContent;
                wrap.querySelector('.item-body').value = wrap.querySelector('.item-body-display').textContent;
                setMode(wrap, 'edit');
            });
        });

        container.querySelectorAll('.item-cancel').forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn.closest('.text-field'), 'view');
            });
        });

        container.querySelectorAll('.item-save').forEach(btn => {
            btn.addEventListener('click', async () => {
                const wrap = btn.closest('.text-field');
                const status = wrap.querySelector('.item-edit-form .item-status');
                status.classList.remove('error');
                status.textContent = 'Saving...';

                const title = wrap.querySelector('.item-title').value;
                const body = wrap.querySelector('.item-body').value;

                const { error } = await supabaseClient.from('policy_items').update({ title, body }).eq('id', wrap.dataset.id);

                if (error) {
                    status.textContent = 'Failed: ' + error.message;
                    status.classList.add('error');
                } else {
                    wrap.querySelector('.item-title-display').textContent = title;
                    wrap.querySelector('.item-body-display').textContent = body;
                    status.textContent = '';
                    setMode(wrap, 'view');
                }
            });
        });

        container.querySelectorAll('.item-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
                const wrap = btn.closest('.text-field');
                if (!confirm('Remove this item from the site?')) return;

                const { error } = await supabaseClient.from('policy_items').delete().eq('id', wrap.dataset.id);
                if (error) {
                    const status = wrap.querySelector('.item-view .item-status');
                    status.textContent = 'Failed: ' + error.message;
                    status.classList.add('error');
                } else {
                    wrap.remove();
                }
            });
        });
    }

    document.getElementById('add-policy-btn').addEventListener('click', async () => {
        await supabaseClient.from('policy_items').insert({ title: 'New Heading', body: 'New text goes here.' });
        renderPolicyItems();
    });

    async function renderPricingItems() {
        const container = document.getElementById('pricing-items');
        const { data, error } = await supabaseClient
            .from('pricing_items')
            .select('id, name, price, description, details')
            .order('created_at', { ascending: true });

        container.innerHTML = '';
        if (error || !data) return;

        data.forEach(item => {
            const wrap = document.createElement('div');
            wrap.className = 'text-field';
            wrap.dataset.id = item.id;
            wrap.innerHTML = `
                <div class="item-view">
                    <h4 class="item-title-display"></h4>
                    <p class="item-body-display"></p>
                    <p class="item-details-display"></p>
                    <div class="item-actions" style="margin-top:10px;">
                        <button class="btn small item-edit">Edit</button>
                        <button class="btn small danger item-delete">Delete</button>
                        <span class="item-status"></span>
                    </div>
                </div>
                <div class="item-edit-form" style="display:none;">
                    <label>Service Name</label>
                    <input type="text" class="item-name">
                    <label>Price</label>
                    <input type="text" class="item-price">
                    <label>Description (short line under the price)</label>
                    <textarea class="item-description"></textarea>
                    <label>Hair / Service Details (its own space — one line per point)</label>
                    <textarea class="item-details"></textarea>
                    <div class="item-actions">
                        <button class="btn small item-save">Save</button>
                        <button class="btn small neutral item-cancel">Cancel</button>
                        <span class="item-status"></span>
                    </div>
                </div>
            `;
            wrap.querySelector('.item-title-display').textContent = `${item.name} — ${item.price}`;
            wrap.querySelector('.item-body-display').textContent = item.description;
            wrap.querySelector('.item-details-display').textContent = item.details || '';
            wrap.querySelector('.item-name').value = item.name;
            wrap.querySelector('.item-price').value = item.price;
            wrap.querySelector('.item-description').value = item.description;
            wrap.querySelector('.item-details').value = item.details || '';
            container.appendChild(wrap);
        });

        function setMode(wrap, mode) {
            wrap.querySelector('.item-view').style.display = mode === 'view' ? 'block' : 'none';
            wrap.querySelector('.item-edit-form').style.display = mode === 'edit' ? 'block' : 'none';
        }

        container.querySelectorAll('.item-edit').forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn.closest('.text-field'), 'edit');
            });
        });

        container.querySelectorAll('.item-cancel').forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn.closest('.text-field'), 'view');
            });
        });

        container.querySelectorAll('.item-save').forEach(btn => {
            btn.addEventListener('click', async () => {
                const wrap = btn.closest('.text-field');
                const status = wrap.querySelector('.item-edit-form .item-status');
                status.classList.remove('error');
                status.textContent = 'Saving...';

                const name = wrap.querySelector('.item-name').value;
                const price = wrap.querySelector('.item-price').value;
                const description = wrap.querySelector('.item-description').value;
                const details = wrap.querySelector('.item-details').value;

                const { error } = await supabaseClient.from('pricing_items').update({ name, price, description, details }).eq('id', wrap.dataset.id);

                if (error) {
                    status.textContent = 'Failed: ' + error.message;
                    status.classList.add('error');
                } else {
                    wrap.querySelector('.item-title-display').textContent = `${name} — ${price}`;
                    wrap.querySelector('.item-body-display').textContent = description;
                    wrap.querySelector('.item-details-display').textContent = details;
                    status.textContent = '';
                    setMode(wrap, 'view');
                }
            });
        });

        container.querySelectorAll('.item-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
                const wrap = btn.closest('.text-field');
                if (!confirm('Remove this item from the site?')) return;

                const { error } = await supabaseClient.from('pricing_items').delete().eq('id', wrap.dataset.id);
                if (error) {
                    const status = wrap.querySelector('.item-view .item-status');
                    status.textContent = 'Failed: ' + error.message;
                    status.classList.add('error');
                } else {
                    wrap.remove();
                }
            });
        });
    }

    document.getElementById('add-pricing-btn').addEventListener('click', async () => {
        await supabaseClient.from('pricing_items').insert({ name: 'New Service', price: '$0', description: '' });
        renderPricingItems();
    });

    async function showPanelForSession(session) {
        if (session) {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('upload-panel').style.display = 'block';
            document.getElementById('whoami').textContent = 'Logged in as ' + session.user.email;
            renderSlots();
            renderPolicyItems();
            renderPricingItems();
        } else {
            document.getElementById('login-panel').style.display = 'block';
            document.getElementById('upload-panel').style.display = 'none';
        }
    }

    supabaseClient.auth.getSession().then(({ data }) => showPanelForSession(data.session));
    supabaseClient.auth.onAuthStateChange((_event, session) => showPanelForSession(session));

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = '';

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
            errorEl.textContent = 'Wrong email or password.';
        }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
    });
</script>

</body>
</html>
